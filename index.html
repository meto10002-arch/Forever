<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;

flex-direction:column;

overflow:hidden;

background:url("https://i.ibb.co/QvNgVm3Q/file-00000000c6b0720aa8fde380ede155fb.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

}

body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.45);

backdrop-filter:blur(2px);

z-index:-1;

}

header{

height:70px;

display:flex;

align-items:center;

justify-content:center;

font-size:34px;

font-weight:bold;

color:#FFD27A;

text-shadow:0 0 20px rgba(255,210,122,.7);

}

</style>

</head>

<body>

<header>

Forever

</header>
<div id="messages"></div>

<footer>

<input
id="text"
type="text"
placeholder="اكتب رسالتك...">

<button id="send">

➤

</button>

</footer>

<div id="login">

<div id="card">

<h2>

مرحباً بك

</h2>

<p>

اكتب اسمك للدخول

</p>

<input

id="username"

type="text"

placeholder="اسم المستخدم">

<button

id="loginBtn">

دخول

</button>

</div>

</div>

<style>

#messages{

flex:1;

overflow-y:auto;

padding:15px;

}

footer{

height:70px;

display:flex;

padding:10px;

gap:10px;

background:rgba(0,0,0,.45);

backdrop-filter:blur(12px);

}

#text{

flex:1;

border:none;

outline:none;

padding:15px;

border-radius:12px;

font-size:16px;

background:rgba(255,255,255,.15);

color:white;

}

#text::placeholder{

color:#ddd;

}

#send{

width:70px;

border:none;

border-radius:12px;

background:#FFD27A;

font-size:24px;

font-weight:bold;

}

#login{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

background:rgba(0,0,0,.65);

}

#card{

width:90%;

background:rgba(20,20,20,.75);

backdrop-filter:blur(18px);

padding:25px;

border-radius:18px;

text-align:center;

}

#card h2{

margin-bottom:15px;

color:#FFD27A;

}

#card p{

margin-bottom:15px;

color:#ddd;

}

#username{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:10px;

margin-bottom:15px;

font-size:16px;

}

#loginBtn{

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#FFD27A;

font-size:18px;

font-weight:bold;

}

</style>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBIn6F4zAj0zPLiqeaX-oyw8BN7vcPs1gk",

authDomain:"forever-6d5f3.firebaseapp.com",

projectId:"forever-6d5f3",

storageBucket:"forever-6d5f3.firebasestorage.app",

messagingSenderId:"59020871625",

appId:"1:59020871625:web:3b836ecba5a90dbf3d4a18"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const messages = document.getElementById("messages");

const text = document.getElementById("text");

const send = document.getElementById("send");

const login = document.getElementById("login");

const username = document.getElementById("username");

const loginBtn = document.getElementById("loginBtn");

let myName = localStorage.getItem("forever_name");

if(myName){

login.style.display="none";

}
  loginBtn.onclick = () => {

if(username.value.trim()==""){

alert("اكتب اسم المستخدم");

return;

}

myName = username.value.trim();

localStorage.setItem("forever_name", myName);

login.style.display = "none";

};

const q = query(

collection(db,"forever_messages"),

orderBy("time")

);

onSnapshot(q,(snapshot)=>{

messages.innerHTML="";

snapshot.forEach((doc)=>{

const data = doc.data();

const div = document.createElement("div");

div.className = "message";

if(data.sender==myName){

div.classList.add("me");

}else{

div.classList.add("friend");

}

let t="";

if(data.time){

t = new Date(

data.time.seconds*1000

).toLocaleTimeString("ar-IQ");

}

div.innerHTML = `

<div class="sender">

${data.sender}

</div>

<div>

${data.text}

</div>

<div class="time">

${t}

</div>

`;

messages.appendChild(div);

});

messages.scrollTop = messages.scrollHeight;

});
  send.onclick = async () => {

if(myName == null){

alert("سجل دخول أولاً");

return;

}

if(text.value.trim()==""){

return;

}

await addDoc(

collection(db,"forever_messages"),

{

sender: myName,

text: text.value,

time: serverTimestamp()

}

);

text.value="";

};

text.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){

send.click();

}

});
  </script>

</body>

</html>
